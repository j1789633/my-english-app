<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿嬤的 AI 零元英文機 (免卡版)</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #fdf5e6; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #8b4513; }
        canvas { border-radius: 15px; background: #ffffff; border: 2px solid #ddd; margin-top: 10px; cursor: pointer; max-width: 100%; }
        .controls { display: flex; justify-content: space-around; margin-top: 20px; flex-wrap: wrap; }
        button { background: #8b4513; color: white; border: none; padding: 12px 20px; border-radius: 50px; cursor: pointer; font-size: 16px; margin: 5px; font-weight: bold; }
        button:hover { background: #5d4037; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #ddd; width: 70%; margin-top: 15px; font-size: 16px; }
        .status-bar { font-size: 14px; color: #6d4c41; margin-bottom: 15px; background: #fff8e1; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👵 阿嬤的 AI 英文點點樂</h1>
    <div class="status-bar">📊 累計練習：<span id="scoreText">0</span> 次 | 💡 狀態：<span id="statusText">準備就緒</span></div>
    <canvas id="mainCanvas" width="400" height="300"></canvas>
    <div id="aiInputArea" style="display:none;">
        <input type="text" id="userSpeech" placeholder="想跟老師說什麼？(英文或中文)">
        <button onclick="sendToAI()">發送給老師</button>
    </div>
    <div class="controls">
        <button onclick="startVocab()">1. 記單字</button>
        <button onclick="startQuiz()">2. 考多益</button>
        <button onclick="startAI()">3. 跟 AI 聊天</button>
    </div>
</div>

<script>
    // 🔑 這是阿嬤那把免填卡的 Groq 鑰匙
    const GROQ_KEY = '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'; 

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let count = parseInt(localStorage.getItem('studyCount') || '0');

    function updateStats(status) {
        document.getElementById('scoreText').innerText = count;
        document.getElementById('statusText').innerText = status;
        localStorage.setItem('studyCount', count);
    }

    function draw(title, content, color = "#8b4513") {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center";
        ctx.fillStyle = color;
        ctx.font = "bold 24px Arial";
        ctx.fillText(title, 200, 50);
        ctx.fillStyle = "#333";
        ctx.font = "20px Arial";
        const lines = getLines(ctx, content, 340);
        lines.forEach((line, i) => ctx.fillText(line, 200, 110 + (i * 35)));
    }

    function getLines(ctx, text, maxWidth) {
        let words = text.split("");
        let lines = [], currentLine = words[0];
        for (let i = 1; i < words.length; i++) {
            if (ctx.measureText(currentLine + words[i]).width < maxWidth) { currentLine += words[i]; }
            else { lines.push(currentLine); currentLine = words[i]; }
        }
        lines.push(currentLine);
        return lines;
    }

    function startVocab() {
        document.getElementById('aiInputArea').style.display = 'none';
        count++; updateStats("學習中");
        draw("今日商務單字", "Innovation (n.) 創新\nWe focus on innovation.", "#4A90E2");
    }

    function startQuiz() {
        document.getElementById('aiInputArea').style.display = 'none';
        updateStats("測驗中");
        draw("多益測驗題", "Please _____ your password.\n(A) enter  (B) eat", "#E67E22");
    }

    function startAI() {
        document.getElementById('aiInputArea').style.display = 'block';
        updateStats("AI 老師在線");
        draw("AI 教室", "阿嬤好！想練哪句英文？\n下方輸入後按發送喔！", "#27AE60");
    }

    async function sendToAI() {
        const msg = document.getElementById('userSpeech').value;
        if (!msg) return;
        draw("AI 正在想...", "阿嬤稍等，這家老師很快！", "#999");
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "user", content: `你是一位幽默親切的英文老師，教導八十歲阿嬤商務英文。請用中英雙語(70%英文)簡短回覆並大大鼓勵阿嬤。阿嬤說：${msg}`}]
                })
            });
            const data = await response.json();
            const reply = data.choices[0].message.content;
            count += 5; updateStats("讚喔！");
            draw("AI 老師回覆", reply, "#27AE60");
            document.getElementById('userSpeech').value = "";
        } catch (e) {
            draw("哎呀！收訊斷了", "阿嬤檢查一下 Wi-Fi 喔", "#E74C3C");
        }
    }
    draw("阿嬤妳好！", "AI 鑰匙已接通！點按鈕開始吧！", "#8b4513");
</script>
</body>
</html>
